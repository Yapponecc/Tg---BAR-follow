<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Bar</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <section class="goal-box" aria-live="polite">
    <div class="tg-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.5 3.5L18.6 20.2C18.4 21.3 17.7 21.6 16.8 21.1L11.4 17.1L8.8 19.6C8.5 19.9 8.2 20.2 7.6 20.2L8 14.7L18 5.7C18.4 5.3 17.9 5.1 17.3 5.4L5 13.1L-0.3 11.5C-1.4 11.2-1.4 10.4-0.1 9.9L20.1 2.1C21.1 1.7 21.9 2.3 21.5 3.5Z" fill="currentColor"/>
      </svg>
    </div>

    <div class="bar-shell">
      <div class="bar-fill" id="barFill"></div>

      <div class="bar-left" id="leftCount">0</div>
      <div class="bar-center" id="titleText">TELEGRAM SUBS ❤</div>
      <div class="bar-right" id="goalCount">1000</div>
    </div>
  </section>

  <script src="./app.js" type="module"></script>
</body>
</html>
