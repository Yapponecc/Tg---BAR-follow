<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Bar</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <section class="goal-box" aria-live="polite">
    <div class="tg-icon" aria-hidden="true">✈</div>

    <div class="bar-shell">
      <div class="bar-fill" id="barFill"></div>
      <div class="bar-left" id="leftCount">0</div>
      <div class="bar-center" id="titleText">TELEGRAM SUBS ❤</div>
      <div class="bar-right" id="goalCount">1000</div>
    </div>
  </section>

  <script src="./app.js" type="module"></script>
</body>
</html>
