<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Subs Overlay</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <section class="card" aria-live="polite">
      <div class="topline"><span class="dot"></span><span class="label" id="label">Telegram</span></div>
      <div class="numbers"><span class="count" id="count">--</span><span class="suffix">subs</span></div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <div class="meta" id="meta">connecting...</div>
    </section>
  </div>
  <script src="./app.js" type="module"></script>
</body>
</html>
